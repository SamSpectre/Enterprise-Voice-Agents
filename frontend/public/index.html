<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP Group — AI Voice Interview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #FFCC00;
            --gold-dim: rgba(255, 204, 0, 0.10);
            --bg: #0b0b0f;
            --text-primary: #f5f5f7;
            --text-secondary: #8a8a8e;
            --text-tertiary: #4a4a4e;
            --border: rgba(255, 255, 255, 0.06);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .brand-mark {
            width: 28px;
            height: 28px;
            background: var(--gold);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            color: #0b0b0f;
        }

        .brand-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .brand-name span {
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ── Main ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 420px;
            margin-bottom: 2rem;
        }

        /* ── Name form ── */
        #name-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }

        #name-form input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #name-form input::placeholder {
            color: var(--text-tertiary);
        }

        #name-form input:focus {
            border-color: rgba(255, 204, 0, 0.4);
        }

        #name-form button {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: var(--gold);
            color: #0b0b0f;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #name-form button:hover {
            opacity: 0.9;
        }

        /* ── Active state after form submit ── */
        .active-hint {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .active-hint.visible {
            display: flex;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .active-hint p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ── Footer ── */
        footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--border);
        }

        footer span {
            font-size: 0.72rem;
            color: var(--text-tertiary);
        }

        footer .sep {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-tertiary);
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            header { padding: 1rem 1.25rem; }
            h1 { font-size: 1.5rem; }
            .subtitle { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-mark">ep</div>
        <div class="brand-name">EP Group <span>Engineering People</span></div>
    </div>
</header>

<main>
    <h1>Speak with Alex</h1>
    <p class="subtitle">
        Our AI interviewer will guide you through a brief
        pre-screening for engineering roles. Enter your name to begin.
    </p>

    <form id="name-form">
        <input type="text" id="candidate-name" placeholder="Your name" required autofocus>
        <button type="submit">Start Interview</button>
    </form>

    <div class="active-hint" id="active-hint">
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Agent online</span>
        </div>
        <p>Click the orb in the bottom-right to speak.</p>
    </div>
</main>

<footer>
    <span>Engineering People GmbH</span>
    <div class="sep"></div>
    <span>Stuttgart, Germany</span>
</footer>

<script>
    document.getElementById('name-form').addEventListener('submit', function(e) {
        e.preventDefault();

        var name = document.getElementById('candidate-name').value.trim();
        if (!name) return;

        // Hide form, show hint
        this.style.display = 'none';
        document.getElementById('active-hint').classList.add('visible');

        // Create widget with dynamic variables
        var widget = document.createElement('elevenlabs-convai');
        widget.setAttribute('agent-id', 'agent_8701kncm94jgfzzv8k8x792qr7jj');
        // Use default ElevenLabs blue/white orb colors
        widget.setAttribute('dynamic-variables', JSON.stringify({
            candidate_name: name,
            company_name: 'EP Group'
        }));
        document.body.appendChild(widget);
    });
</script>
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

</body>
</html>
